<!--
  sentinel-widget.html
  Drop-in styled Sentinel L3 Status Widget for Aetheron Platform dashboards.

  Usage:
    <div id="sentinel-widget-container"></div>
    <script type="module">
      import { updateSentinelDashboardUI } from '../sentinel-integration.js';
      // After initSentinelIntegration()
      await updateSentinelDashboardUI('sentinel-widget-container');
    </script>
-->

<div class="sentinel-widget">
  <div class="sentinel-header">
    <div class="header-left">
      <span class="icon">🛡️</span>
      <h3>Sentinel L3</h3>
    </div>
    <div class="status-badge" id="sentinel-threat-badge">
      LOADING...
    </div>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-label">Security Score</div>
      <div class="metric-value" id="sentinel-security">--</div>
      <div class="metric-sub">/ 1000</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Quantum Coherence</div>
      <div class="metric-value" id="sentinel-quantum">--%</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Protected APY</div>
      <div class="metric-value" id="sentinel-apy">--%</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">DeFAI Status</div>
      <div class="metric-value" id="sentinel-defai">--</div>
    </div>
  </div>

  <div class="widget-footer">
    <div class="last-updated" id="sentinel-updated">Last updated: --</div>
    <button class="refresh-btn" onclick="window.refreshSentinelWidget && window.refreshSentinelWidget()">
      Refresh
    </button>
  </div>
</div>

<style>
  .sentinel-widget {
    background: linear-gradient(145deg, #0f172a 0%, #1e2937 100%);
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 20px;
    color: #e2e8f0;
    font-family: system-ui, -apple-system, sans-serif;
    box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    max-width: 420px;
    margin: 16px 0;
  }

  .sentinel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sentinel-header h3 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }

  .status-badge {
    padding: 4px 14px;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status-badge.secure { background: #166534; color: #86efac; }
  .status-badge.warning { background: #854d0e; color: #fde047; }
  .status-badge.danger { background: #991b1b; color: #fecaca; }

  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .metric-card {
    background: #1e2937;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #334155;
  }

  .metric-label {
    font-size: 0.75rem;
    color: #94a3b8;
    margin-bottom: 4px;
  }

  .metric-value {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
  }

  .metric-sub {
    font-size: 0.7rem;
    color: #64748b;
  }

  .widget-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: #64748b;
  }

  .refresh-btn {
    background: #334155;
    color: #e2e8f0;
    border: none;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    background: #475569;
  }
</style>

<!DOCTYPE html><html><head><title>Aetheron Pro Terminal</title><link rel="stylesheet" href="trading-terminal.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="wrap"><div class="topbar"><div class="brand"><div class="mark">⚡</div><div><div>Aetheron Terminal Pro</div><div class="sub">Multi-Token Trading</div></div></div><select id="tokenSelect" class="select"><option>AETH</option><option>WMATIC</option><option>USDC</option></select></div><div class="grid"><div class="panel"><h2>Order Book</h2><div id="proBook"></div></div><div class="panel"><h2 id="proSymbol">AETH</h2><div class="chart-wrap"><canvas id="proChart"></canvas></div><div class="mini-grid"><div class="metric"><div class="label">Price</div><div id="proPrice" class="value">--</div></div><div class="metric"><div class="label">24h Change</div><div id="proChange" class="value">--</div></div><div class="metric"><div class="label">Liquidity</div><div id="proLiquidity" class="value">--</div></div><div class="metric"><div class="label">Volume</div><div id="proVolume" class="value">--</div></div></div><div class="toolbar"><a id="swapLink" class="chip" target="_blank">Trade on DEX</a></div></div><div class="panel"><h2>Flow + Signal</h2><div class="metric"><div class="label">Buy Flow</div><div id="buyFlow" class="value">--</div></div><div class="metric"><div class="label">Sell Flow</div><div id="sellFlow" class="value">--</div></div><div class="metric"><div class="label">Turnover</div><div id="turnoverValue" class="value">--</div></div><div class="metric"><div class="label">Mid Price</div><div id="midValue" class="value">--</div></div><div class="metric"><div class="label">Signal Score</div><div id="signalScore" class="value">--</div></div><div class="metric"><div class="label">Regime</div><div id="regimeValue" class="value">--</div></div><div class="metric"><div class="label">Strategy</div><div id="ideaValue" class="value">--</div></div></div></div><div class="two wide"><div class="panel"><h3>Indicators</h3><canvas id="indicatorChart"></canvas><p>RSI: <b id="rsiValue">--</b> | MACD: <b id="macdValue">--</b></p></div><div class="panel"><h3>Navigation</h3><a class="terminal-link" href="hedge-fund-dashboard.html">HF Analytics</a><br><a class="terminal-link" href="production-dashboard-v2.html">Dashboard</a></div></div></div><script src="trading-terminal-pro.js"></script></body></html>

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "aetheron-network"
    static_configs:
      - targets:
          - "192.168.10.10:8080"
          - "192.168.10.11:8080"
          - "192.168.10.12:8080"
        labels:
          network: "aetheron-testnet"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

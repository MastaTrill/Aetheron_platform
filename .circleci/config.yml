version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:20.11.0
    environment:
      CACHE_BUST: "2026-03-16-force-node20"
    steps:
      - checkout
      - run:
          name: Install Node.js dependencies
          command: npm ci
      - run:
          name: Run linting
          command: |
            if npm run 2>/dev/null | grep -q "^\s*lint"; then
              npm run lint
            else
              echo "No lint script defined - skipping linting"
            fi
      - run:
          name: Check for build script
          command: |
            if npm run 2>/dev/null | grep -q "^\s*build"; then
              npm run build
            else
              echo "No build script found - static site detected"
            fi
      - run:
          name: Run tests
          command: |
            if npm run 2>/dev/null | grep -q "^\s*test"; then
              npm test
            else
              echo "No test script found"
            fi
workflows:
  build_and_test:
    jobs:
      - build

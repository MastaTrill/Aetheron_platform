<!-- Sentinel L3 Status Widget (Immediate Action) -->
<div id="sentinel-widget-container" class="card mb-2" aria-label="Sentinel L3 Protection Status"></div>

<script type="module">
  import { initSentinelIntegration, updateSentinelDashboardUI } from './sentinel-integration.js';
  window.addEventListener('load', async () => {
    const success = await initSentinelIntegration();
    if (success) {
      await updateSentinelDashboardUI('sentinel-widget-container');
    }
  });
</script>

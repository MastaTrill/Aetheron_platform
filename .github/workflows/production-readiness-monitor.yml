name: Production Readiness Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check public pages and assets
        shell: bash
        run: |
          set -euo pipefail
          for url in \
            https://aetrs.com/ \
            https://aetrs.com/presale.html \
            https://aetrs.com/presale-config.js \
            https://aetrs.com/presale.js \
            https://aetrs.com/presale-readiness.js \
            https://mastatrill.github.io/Aetheron_platform/ \
            https://mastatrill.github.io/Aetheron_platform/presale.html
          do
            curl --fail --silent --show-error --location --retry 3 --max-time 20 "$url" >/dev/null
          done

      - name: Verify Base contract bytecode
        shell: bash
        env:
          BASE_RPC_URL: https://mainnet.base.org
          AETH_TOKEN: 0xecf7E17faE148C01E1b5008A31Dfd2d1B6608E4e
          PRESALE: 0xe0A3B6368312dFd3E7E76202e673f895f8235A3d
        run: |
          set -euo pipefail
          rpc() {
            curl --fail --silent --show-error --retry 3 --max-time 20 \
              -H 'content-type: application/json' \
              --data "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_getCode\",\"params\":[\"$1\",\"latest\"]}" \
              "$BASE_RPC_URL"
          }
          for address in "$AETH_TOKEN" "$PRESALE"; do
            response="$(rpc "$address")"
            echo "$response" | grep -Eq '"result":"0x[0-9a-fA-F]{4,}"' || {
              echo "Missing contract bytecode for $address"
              exit 1
            }
          done

      - name: Enforce published Base configuration
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'chainId: 8453' presale-config.js
          grep -q 'status: "verify_on_chain"' presale-config.js
          grep -q 'presale-readiness.js' presale.html
          ! grep -q 'VERIFIED PRESALE LIVE' presale.html

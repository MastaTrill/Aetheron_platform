name: Deploy Corrected Base Presale

on:
  workflow_dispatch:
    inputs:
      dry_run: true
        description: "Run all preflight checks without sending transactions"
        required: true
        type: boolean
        default: true
      presale_rate:
        description: "AETH tokens per 1 ETH"
        required: true
        type: string
        default: "1000000"
      soft_cap_eth:
        description: "Soft cap in ETH"
        required: true
        type: string
        default: "5"
      hard_cap_eth:
        description: "Hard cap in ETH"
        required: true
        type: string
        default: "33.333333"
      min_eth:
        description: "Minimum contribution in ETH"
        required: true
        type: string
        default: "0.001"
      max_eth:
        description: "Maximum cumulative contribution per wallet in ETH"
        required: true
        type: string
        default: "1"
      start_delay_seconds:
        description: "Delay before sale start, minimum 3600"
        required: true
        type: string
        default: "3600"
      duration_seconds:
        description: "Sale duration, minimum 86400"
        required: true
        type: string
        default: "1209600"
      confirmation: DRY_RUN
        description: "For a live deployment type DEPLOY_CORRECTED_PRESALE; leave DRY_RUN for rehearsal"
        required: true
        type: string
        default: "DRY_RUN"

permissions:
  contents: write

concurrency:
  group: deploy-corrected-base-presale
  cancel-in-progress: false

env:
  BASE_RPC_URL: "https://mainnet.base.org"
  AETH_TOKEN_ADDRESS: "0xecf7E17faE148C01E1b5008A31Dfd2d1B6608E4e"
  TREASURY_ADDRESS: "0x15b9F8ecedafD69Eb1dD93E51fE522690Bf6B7C2"
  INVALID_PRESALE_ADDRESS: "0xA7aa360d2F00Cf4130B3244D0A13AE32a49ab07C"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.dry_run && 'presale-dry-run' || 'base-mainnet-production' }}

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smart-contract/package-lock.json

      - name: Reject unauthorized live deployment
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          if [ "${{ inputs.confirmation }}" != "DEPLOY_CORRECTED_PRESALE" ]; then
            echo "Live deployment confirmation phrase is missing."
            exit 1
          fi

      - name: Validate protected credentials
        shell: bash
        env:
          PRIVATE_KEY: ${{ secrets.BASE_DEPLOYER_PRIVATE_KEY }}
          EXPLORER_API_KEY: ${{ secrets.ETHERSCAN_API_KEY || secrets.BASESCAN_API_KEY }}
        run: |
          test -n "$PRIVATE_KEY" || { echo "Missing BASE_DEPLOYER_PRIVATE_KEY secret"; exit 1; }
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            test -n "$EXPLORER_API_KEY" || { echo "Missing ETHERSCAN_API_KEY or BASESCAN_API_KEY secret"; exit 1; }
          fi

      - name: Install exact dependencies
        working-directory: smart-contract
        run: npm ci

      - name: Compile contracts
        working-directory: smart-contract
        run: npm run compile

      - name: Run contract frontend and production-config tests
        working-directory: smart-contract
        run: npm test

      - name: Require invalid presale cancellation before live replacement
        if: ${{ !inputs.dry_run }}
        working-directory: smart-contract
        env:
          PRIVATE_KEY: ${{ secrets.BASE_DEPLOYER_PRIVATE_KEY }}
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { ethers } from "ethers";
          const provider = new ethers.JsonRpcProvider(process.env.BASE_RPC_URL, 8453, { staticNetwork: true, batchMaxCount: 1 });
          const invalid = new ethers.Contract(process.env.INVALID_PRESALE_ADDRESS, [
            "function owner() view returns (address)",
            "function cancelled() view returns (bool)"
          ], provider);
          const wallet = new ethers.Wallet(process.env.PRIVATE_KEY, provider);
          const [owner, cancelled] = await Promise.all([invalid.owner(), invalid.cancelled()]);
          if (owner.toLowerCase() !== wallet.address.toLowerCase()) throw new Error("Signer is not invalid presale owner");
          if (!cancelled) throw new Error("Invalid presale must be cancelled before replacement deployment");
          console.log("Invalid presale cancellation confirmed.");
          NODE

      - name: Execute guarded deployment and funding sequence
        working-directory: smart-contract
        env:
          PRIVATE_KEY: ${{ secrets.BASE_DEPLOYER_PRIVATE_KEY }}
          PRESALE_RATE: ${{ inputs.presale_rate }}
          PRESALE_SOFT_CAP_ETH: ${{ inputs.soft_cap_eth }}
          PRESALE_HARD_CAP_ETH: ${{ inputs.hard_cap_eth }}
          PRESALE_MIN_ETH: ${{ inputs.min_eth }}
          PRESALE_MAX_ETH: ${{ inputs.max_eth }}
          PRESALE_START_DELAY_SECONDS: ${{ inputs.start_delay_seconds }}
          PRESALE_DURATION_SECONDS: ${{ inputs.duration_seconds }}
          DRY_RUN: ${{ inputs.dry_run }}
          CONFIRM_BASE_MAINNET_DEPLOY: ${{ inputs.confirmation }}
        shell: bash
        run: |
          set -o pipefail
          npm run deploy:presale:base:safe 2>&1 | tee ../corrected-presale-deployment.log

      - name: Verify corrected Base state
        if: ${{ !inputs.dry_run }}
        working-directory: smart-contract
        shell: bash
        run: |
          set -o pipefail
          npm run verify:base:readonly 2>&1 | tee ../corrected-presale-state-verification.log

      - name: Run disposable Base fork test
        if: ${{ !inputs.dry_run }}
        working-directory: smart-contract
        shell: bash
        run: |
          set -o pipefail
          npm run test:base-fork 2>&1 | tee ../corrected-presale-fork-test.log

      - name: Persist deployment journal and disabled frontend
        if: ${{ !inputs.dry_run && always() }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add smart-contract/deployments/presale-base.json presale-config.js
          if git diff --cached --quiet; then
            echo "No deployment journal changes to commit."
          else
            git commit -m "deploy: journal corrected Base presale state"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Submit and confirm BaseScan source verification
        if: ${{ !inputs.dry_run && success() }}
        working-directory: smart-contract
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY || secrets.BASESCAN_API_KEY }}
        shell: bash
        run: |
          set -o pipefail
          npm run verify:basescan 2>&1 | tee ../corrected-presale-basescan-verification.log

      - name: Publish verified replacement address while purchases stay disabled
        if: ${{ !inputs.dry_run && success() }}
        working-directory: smart-contract
        run: npm run record:verified-frontend

      - name: Persist BaseScan and disabled-frontend evidence
        if: ${{ !inputs.dry_run && success() }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add smart-contract/deployments/presale-base.json presale-config.js
          if git diff --cached --quiet; then
            echo "No verification evidence changed."
            exit 1
          fi
          git commit -m "verify: record BaseScan-verified replacement presale"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corrected-base-presale-deployment-evidence
          path: |
            smart-contract/deployments/presale-base.json
            presale-config.js
            corrected-presale-deployment.log
            corrected-presale-state-verification.log
            corrected-presale-fork-test.log
            corrected-presale-basescan-verification.log
          if-no-files-found: warn

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run requested. No transaction was authorized by this workflow." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Any completed Base transactions and partial state are preserved in the deployment journal and artifact." >> "$GITHUB_STEP_SUMMARY"
            echo "The replacement address may be published for transparency, but public purchase controls remain disabled." >> "$GITHUB_STEP_SUMMARY"
            echo "A separate owner-wallet smoke purchase and launch authorization are still required." >> "$GITHUB_STEP_SUMMARY"
          fi

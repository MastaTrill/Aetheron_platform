name: Presale Operations Preflight

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/presale-ops-preflight.yml"
      - "smart-contract/**"
      - "presale-config.js"

permissions:
  contents: read

env:
  AETH_TOKEN_ADDRESS: "0xecf7E17faE148C01E1b5008A31Dfd2d1B6608E4e"
  INVALID_PRESALE_ADDRESS: "0xA7aa360d2F00Cf4130B3244D0A13AE32a49ab07C"

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: presale-dry-run

    steps:
      - name: Check out operations branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smart-contract/package-lock.json

      - name: Report dry-run secret readiness
        id: secrets
        shell: bash
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.BASE_DEPLOYER_PRIVATE_KEY }}
          TREASURY_ADDRESS: ${{ secrets.PRESALE_TREASURY_ADDRESS }}
        run: |
          missing=0
          : > secret-readiness.log
          if [ -z "$BASE_RPC_URL" ]; then echo "Missing: BASE_RPC_URL" | tee -a secret-readiness.log; missing=1; else echo "Configured: BASE_RPC_URL" >> secret-readiness.log; fi
          if [ -z "$PRIVATE_KEY" ]; then echo "Missing: BASE_DEPLOYER_PRIVATE_KEY" | tee -a secret-readiness.log; missing=1; else echo "Configured: BASE_DEPLOYER_PRIVATE_KEY" >> secret-readiness.log; fi
          if [ -z "$TREASURY_ADDRESS" ]; then echo "Missing: PRESALE_TREASURY_ADDRESS" | tee -a secret-readiness.log; missing=1; else echo "Configured: PRESALE_TREASURY_ADDRESS" >> secret-readiness.log; fi
          if [ "$missing" -eq 0 ]; then
            echo "can_dry_run=true" >> "$GITHUB_OUTPUT"
            echo "All protected dry-run secrets are configured." | tee -a secret-readiness.log
          else
            echo "can_dry_run=false" >> "$GITHUB_OUTPUT"
            echo "The owner-bound deployment rehearsal was skipped; read-only checks continued." | tee -a secret-readiness.log
          fi

      - name: Install exact dependencies
        working-directory: smart-contract
        run: npm ci

      - name: Compile contracts
        working-directory: smart-contract
        run: npm run compile

      - name: Run contract and frontend tests
        working-directory: smart-contract
        run: npm test

      - name: Inspect invalid presale recovery surface
        working-directory: smart-contract
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || 'https://mainnet.base.org' }}
        run: |
          set -o pipefail
          npm run inspect:invalid-presale 2>&1 | tee ../invalid-presale-recovery-preflight.log

      - name: Verify safely disabled Base state
        working-directory: smart-contract
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || 'https://mainnet.base.org' }}
          ALLOW_DISABLED_PRESALE: "true"
        run: |
          set -o pipefail
          npm run verify:base:readonly 2>&1 | tee ../base-readonly-preflight.log

      - name: Execute corrected deployment dry run
        if: ${{ steps.secrets.outputs.can_dry_run == 'true' }}
        working-directory: smart-contract
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.BASE_DEPLOYER_PRIVATE_KEY }}
          TREASURY_ADDRESS: ${{ secrets.PRESALE_TREASURY_ADDRESS }}
          PRESALE_RATE: "1000"
          PRESALE_SOFT_CAP_ETH: "5"
          PRESALE_HARD_CAP_ETH: "25"
          PRESALE_MIN_ETH: "0.001"
          PRESALE_MAX_ETH: "1"
          PRESALE_START_DELAY_SECONDS: "14400"
          PRESALE_DURATION_SECONDS: "864000"
          DRY_RUN: "true"
        run: |
          set -o pipefail
          npm run deploy:base-presale:dry-run 2>&1 | tee ../corrected-presale-dry-run.log

      - name: Record skipped owner-bound dry run
        if: ${{ steps.secrets.outputs.can_dry_run != 'true' }}
        shell: bash
        run: |
          echo "Corrected deployment dry run skipped because one or more protected secrets are absent." | tee corrected-presale-dry-run.log

      - name: Run disposable Base fork simulation
        working-directory: smart-contract
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || 'https://mainnet.base.org' }}
        run: |
          set -o pipefail
          npm run test:base-fork 2>&1 | tee ../base-fork-preflight.log

      - name: Upload preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: presale-operations-preflight
          path: |
            secret-readiness.log
            invalid-presale-recovery-preflight.log
            base-readonly-preflight.log
            corrected-presale-dry-run.log
            base-fork-preflight.log
          if-no-files-found: warn

      - name: Summarize safety boundary
        if: always()
        shell: bash
        run: |
          echo "This job is read-only and DRY_RUN=true. It cannot cancel, deploy, fund, or purchase on Base mainnet." >> "$GITHUB_STEP_SUMMARY"
          echo "The example sale values are rehearsal inputs only and are not approved production economics." >> "$GITHUB_STEP_SUMMARY"

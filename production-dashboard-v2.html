<!DOCTYPE html><html><head><title>Aetheron Pro v2</title><link rel="stylesheet" href="production-ui.css"><script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="shell"><h1>Aetheron Dashboard v2</h1><button onclick="connectWallet()">Connect Wallet</button><p id="walletAddress"></p><div class="panel"><h2>Portfolio</h2><p>Balance: <span id="walletBal">0</span></p><p>Staked: <span id="stakedBal">0</span></p><p>Rewards: <span id="rewardBal">0</span></p></div><div class="panel"><h2>Market Stats</h2><p>Price: <span id="statPrice">--</span></p><p>Liquidity: <span id="statLiquidity">--</span></p><p>Market Cap: <span id="statMarketCap">--</span></p><p>24h Volume: <span id="statVolume">--</span></p><p>24h Change: <span id="statChange">--</span></p></div><div class="panel"><canvas id="priceChart"></canvas></div><div class="panel"><canvas id="breakdownChart"></canvas></div><div class="panel"><h2>Actions</h2><input id="amountInput" placeholder="Amount"><br><button onclick="approve()">Approve</button><button onclick="stake()">Stake</button><button onclick="withdraw()">Withdraw</button><button onclick="claim()">Claim</button></div><div id="statusBanner">Ready</div></div><script src="production-dashboard.js"></script><script src="production-stats.js"></script></body></html>

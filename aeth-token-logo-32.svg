      <stop offset=".55" stop-color="#070B17"/>
      <stop offset="1" stop-color="#02030A"/>
    </radialGradient>
    <radialGradient id="world" cx="10.5" cy="10.5" r="14" gradientUnits="userSpaceOnUse">

<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AETH Reward Planning Calculator</title><meta name="description" content="Illustrative AETH reward planning calculator. No public Base staking program is currently advertised."><style>*{box-sizing:border-box}body{margin:0;padding:24px;font:16px/1.6 Inter,system-ui,sans-serif;color:#eafaff;background:#050b1b}.wrap{width:min(720px,100%);margin:35px auto}.panel{background:linear-gradient(145deg,#0a2438,#1b1540);border:1px solid #23556d;border-radius:22px;padding:30px}.notice{background:#0c2031;border-left:4px solid #67e8f9;padding:15px;margin:20px 0;color:#bfd0dc}label{display:block;margin:15px 0 6px;font-weight:800}input,select{width:100%;min-height:49px;border-radius:11px;border:1px solid #396278;background:#07111f;color:white;padding:11px;font-size:1rem}button{width:100%;min-height:50px;margin-top:18px;border:0;border-radius:11px;background:#7c3aed;color:#fff;font-weight:850}.result{margin-top:18px;padding:18px;background:#ffffff0c;border-radius:12px}.back{color:#67e8f9}</style></head><body><main class="wrap"><a class="back" href="index.html">← Home</a><section class="panel"><h1>AETH planning calculator</h1><div class="notice"><strong>Illustrative only.</strong> A public Base staking contract and final reward schedule are not currently being advertised. This calculator does not promise returns.</div><label for="amount">AETH amount</label><input id="amount" type="number" min="0" placeholder="Enter AETH amount"><label for="apy">Illustrative annual rate</label><select id="apy"><option value="5">5%</option><option value="12">12%</option><option value="25">25%</option></select><label for="days">Planning period</label><select id="days"><option value="30">30 days</option><option value="90">90 days</option><option value="180">180 days</option></select><button type="button" onclick="calculate()">Calculate illustration</button><div class="result" id="result">Enter an amount to estimate an illustrative reward.</div></section></main><script>function calculate(){const a=Math.max(0,Number(document.getElementById('amount').value)||0),r=Number(document.getElementById('apy').value)/100,d=Number(document.getElementById('days').value),reward=a*r*d/365;document.getElementById('result').textContent=`Illustrative reward: ${reward.toLocaleString(undefined,{maximumFractionDigits:4})} AETH · Illustrative total: ${(a+reward).toLocaleString(undefined,{maximumFractionDigits:4})} AETH`;}</script></body></html>
